<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>묘노로직</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fff9f2;
        --panel: #ffffff;
        --text: #2a211d;
        --muted: #6d625c;
        --line: #eadbd0;
        --accent: #d9577f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.65;
      }

      main {
        width: min(840px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 6vw, 3.25rem);
        line-height: 1.1;
      }

      p {
        margin: 0 0 16px;
      }

      .card {
        margin-top: 28px;
        padding: 24px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .links {
        display: grid;
        gap: 12px;
        margin-top: 20px;
      }

      a {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .muted {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>묘노로직</h1>
      <p class="muted">고양이 감성의 로컬 노노그램 퍼즐 게임</p>

      <section class="card" aria-labelledby="about-title">
        <h2 id="about-title">앱 정보</h2>
        <p>
          묘노로직은 숫자 힌트를 따라 칸을 채우고 숨겨진 그림을 완성하는 싱글 플레이 퍼즐
          게임입니다. 현재 버전은 계정, 로그인, 광고, 인앱 결제, 클라우드 저장을 제공하지
          않습니다.
        </p>
        <div class="links">
          <a href="./privacy.html">개인정보처리방침</a>
          <a href="./support.html">지원 페이지</a>
        </div>
      </section>
    </main>
  </body>
</html>
