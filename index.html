<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NineTigers App Pages</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fff9f2;
        --panel: #ffffff;
        --text: #2a211d;
        --muted: #6d625c;
        --line: #eadbd0;
        --accent: #d9577f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.65;
      }

      main {
        width: min(840px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 6vw, 3.25rem);
        line-height: 1.1;
      }

      a {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .card {
        margin-top: 28px;
        padding: 24px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .muted {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NineTigers App Pages</h1>
      <p class="muted">Public support and policy pages for NineTigers apps.</p>

      <section class="card" aria-labelledby="apps-title">
        <h2 id="apps-title">Apps</h2>
        <p><a href="./myonologic/">묘노로직 / Myonologic</a></p>
        <p><a href="./graeigeogi-arcade/">그래이거지 아케이드 / Graeigeogi Arcade</a></p>
        <p><a href="./raid-in-storia/">Raid in Storia</a></p>
      </section>
    </main>
  </body>
</html>
