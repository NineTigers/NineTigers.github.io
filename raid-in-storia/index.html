<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Raid in Storia</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --panel: #ffffff;
        --text: #252a2f;
        --muted: #657078;
        --line: #d8d0bf;
        --accent: #b03d36;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.65;
      }

      main {
        width: min(840px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 6vw, 3.25rem);
        line-height: 1.1;
      }

      h2 {
        margin: 0 0 14px;
      }

      p {
        margin: 0 0 16px;
      }

      .card {
        margin-top: 28px;
        padding: 24px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .links {
        display: grid;
        gap: 12px;
        margin-top: 20px;
      }

      a {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .muted {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Raid in Storia</h1>
      <p class="muted">모바일 가로 화면에 맞춘 싱글 플레이 판타지 액션 RPG</p>

      <section class="card" aria-labelledby="about-title">
        <h2 id="about-title">앱 정보</h2>
        <p>
          Raid in Storia는 영웅을 선택하고 훈련과 장비를 준비한 뒤, 숲과 유적지의 루트를
          탐험하며 거대 보스와 전투하는 모바일 액션 RPG입니다. 터치 기반 이동, 조준, 스킬,
          회피 조작에 맞춰 설계되어 있습니다.
        </p>
        <p>
          현재 공개 출시 범위는 싱글 플레이입니다. 계정 동기화, 멀티플레이, 채팅 기능은 현재
          공개 출시 빌드에서 제공하지 않습니다.
        </p>
        <div class="links">
          <a href="./privacy.html">개인정보처리방침</a>
          <a href="./support.html">지원 페이지</a>
        </div>
      </section>

      <section class="card" aria-labelledby="copyright-title">
        <h2 id="copyright-title">저작권</h2>
        <p>© 2026 NineTigers</p>
      </section>
    </main>
  </body>
</html>
